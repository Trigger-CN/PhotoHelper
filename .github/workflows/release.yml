name: Release

permissions:
  contents: write

on:
  push:
    tags:
      - 'v**[0-9]+.[0-9]+.[0-9]+**'
  pull_request:

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: win64
          - os: ubuntu-latest
            artifact_name: linux
          - os: macos-latest
            artifact_name: mac

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Build renderer
        run: npm run build
        env:
          NODE_ENV: production

      - name: Package Electron app
        run: npm run dist
        env:
          NODE_ENV: production
          ELECTRON_MIRROR: "https://npmmirror.com/mirrors/electron/"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}-build
          path: release/
          retention-days: 7

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release/
          merge-multiple: true

      - name: Create checksums
        run: |
          cd release
          for file in *.exe; do
            if [ -f "$file" ]; then
              sha256sum "$file" > "${file}.sha256sum"
            fi
          done
          for file in *.dmg; do
            if [ -f "$file" ]; then
              sha256sum "$file" > "${file}.sha256sum"
            fi
          done
          for file in *.AppImage; do
            if [ -f "$file" ]; then
              sha256sum "$file" > "${file}.sha256sum"
            fi
          done

      - name: Generate changelog
        id: changelog
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          VERSION=${TAG_NAME#v}
          CHANGELOG="## Version $VERSION\n\n"
          CHANGELOG+="Download the artifacts from the Assets section below.\n\n"
          CHANGELOG+="### Checksums\n"
          CHANGELOG+="SHA256 checksums are available in the assets.\n"
          echo "body=$CHANGELOG" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.body }}
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
          files: |
            release/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
